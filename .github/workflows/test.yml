name: CI/CD Pipeline

on:
  push:
    branches:
      - Adithya

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Run Tests
        run: npm run test