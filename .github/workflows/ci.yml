name: Push Updated Docker Image

on:
  push:
    branches:
      - unit-tests-assignment-SravyaPadala-240211

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 21.6.1

    - name: Install dependencies
      run: npm install

    - name: Code linting
      run: npx eslint .

    - name: Code Testing
      run: npm run test

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: Dockerfile
        push: true
        tags:
          sravyapadala/donor_tracking_system:latest
